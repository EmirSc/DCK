<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo Corsario</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      /* Naranja Corsario — cubre el flash mientras carga el iframe */
      background: #FF7F28;
    }

    .frame-wrap {
      position: fixed;
      /* El banner de Google mide ~45px — lo subimos exactamente ese valor        */
      /* Si el header de tu app se corta, ajusta este número (prueba 43, 44, 46)  */
      top: -45px;
      left: 0;
      width: 100%;
      /* Añadimos 45px extra de altura para compensar el recorte superior */
      height: calc(100% + 45px);
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <div class="frame-wrap">
    <iframe
      src="https://script.google.com/macros/s/TU_DEPLOY_ID/exec"
      allowfullscreen
      loading="eager"
    ></iframe>
  </div>

</body>
</html>
